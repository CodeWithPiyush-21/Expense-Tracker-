<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SpendSmart Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <!-- Main App -->
    <div id="appScreen" class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1><i class='bx bx-wallet'></i> SpendSmart Pro</h1>
                <p>Track. Analyze. Optimize.</p>
            </div>
            <div class="header-right">
                <span id="welcomeMessage" class="welcome-text"></span>
                <button onclick="logout()" class="btn-logout" title="Logout"><i class='bx bx-log-out'></i></button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Column: Form & Summary -->
            <div class="left-panel">
                <div class="card summary-card" id="summaryCard">
                    <h2><i class='bx bx-pie-chart-alt-2' ></i> Financial Overview</h2>
                    <div class="totals" style="grid-template-columns: 1fr 1fr 1fr;">
                        <div class="total-box" style="background: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--success);">
                            <span style="color: var(--success);"><i class='bx bx-trending-up'></i> Income</span>
                            <h3 id="totalIncome" style="color: var(--success);">₹0</h3>
                        </div>
                        <div class="total-box" style="background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--danger);">
                            <span style="color: var(--danger);"><i class='bx bx-trending-down'></i> Expenses</span>
                            <h3 id="totalExpense" style="color: var(--danger);">₹0</h3>
                        </div>
                        <div class="total-box" style="background: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--accent);">
                            <span style="color: var(--accent);"><i class='bx bx-wallet-alt'></i> Net Savings</span>
                            <h3 id="netSavings" style="color: var(--accent);">₹0</h3>
                        </div>
                    </div>
                    
                    <div class="budget-container" style="margin-top: 1.5rem; background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 15px; border: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <span style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Monthly Budget</span>
                            <button onclick="setBudget()" style="background: none; border: none; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 0.3rem;"><i class='bx bx-edit-alt'></i> Set</button>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: end; margin-bottom: 0.8rem;">
                            <h3 id="budgetStatus" style="font-size: 1.5rem; color: #fff;">₹0 / ₹0</h3>
                            <span id="budgetPercent" style="font-size: 0.9rem; color: var(--text-muted);">0%</span>
                        </div>
                        <div class="progress-bar" style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                            <div id="budgetProgress" style="height: 100%; width: 0%; background: var(--success); transition: width 0.5s ease, background-color 0.5s ease;"></div>
                        </div>
                    </div>

                    <div style="margin-top: 1rem; background: rgba(139, 92, 246, 0.1); padding: 1rem; border-radius: 10px; border-left: 4px solid #8b5cf6;">
                        <span style="color: #8b5cf6; font-size: 0.9rem; display: block; margin-bottom: 0.3rem;"><i class='bx bx-refresh'></i> Total Monthly Subscriptions</span>
                        <h3 id="totalSubscriptions" style="font-size: 1.2rem; margin:0;">₹0</h3>
                    </div>
                </div>

                <div class="card form-card">
                    <h2><i class='bx bx-plus-circle' ></i> Add Transaction</h2>
                    
                    <div class="type-toggle" style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <label style="flex: 1; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border);">
                            <input type="radio" name="txType" value="expense" checked onchange="toggleCategories()"> Expense
                        </label>
                        <label style="flex: 1; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border);">
                            <input type="radio" name="txType" value="income" onchange="toggleCategories()"> Income
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="e.g. 500">
                    </div>
                    
                    <div class="form-group">
                        <label for="itemName">Description</label>
                        <input type="text" id="itemName" placeholder="e.g. Salary, Milk, Rent">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Category <button onclick="openCategoryModal()" style="background: none; border: none; color: var(--accent); cursor: pointer; float: right; font-size: 0.8rem;">+ Manage</button></label>
                            <select id="category">
                                <!-- Populated dynamically -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date">
                        </div>
                    </div>

                    <div class="form-row" style="align-items: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin: 0; width: 100%;">
                            <input type="checkbox" id="isSubscription">
                            <span><i class='bx bx-calendar-star'></i> Mark as Recurring Subscription</span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="receipt"><i class='bx bx-camera'></i> Upload Receipt / Bill (Optional)</label>
                        <input type="file" id="receipt" accept="image/*" style="padding: 8px; font-size: 0.9rem;">
                    </div>

                    <button onclick="addTransaction()" class="btn-primary"><i class='bx bx-check'></i> Add Transaction</button>
                </div>
            </div>

            <!-- Right Column: List & Analytics -->
            <div class="right-panel">
                <div class="card list-card" id="listCard">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">
                        <h2 style="border: none; margin: 0; padding: 0;"><i class='bx bx-list-ul' ></i> Transactions</h2>
                    </div>
                    
                    <div class="controls-group">
                        <div class="search-bar">
                            <i class='bx bx-search'></i>
                            <input type="text" id="searchInput" placeholder="Search transactions..." onkeyup="displayExpenses()">
                        </div>
                        
                        <div class="filter-actions" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                            <select id="filterType" onchange="handleFilterTypeChange()" style="flex: 1; min-width: 100px; padding: 0.5rem;">
                                <option value="monthly">Monthly</option>
                                <option value="quarterly">Quarterly</option>
                                <option value="yearly">Yearly</option>
                                <option value="all">All Time</option>
                            </select>
                            
                            <input type="month" id="filterMonth" onchange="updateUI()" style="flex: 1; min-width: 120px; padding: 0.5rem;">
                            
                            <select id="filterQuarter" onchange="updateUI()" style="flex: 1; min-width: 120px; display: none; padding: 0.5rem;">
                                <option value="Q1">Q1 (Jan-Mar)</option>
                                <option value="Q2">Q2 (Apr-Jun)</option>
                                <option value="Q3">Q3 (Jul-Sep)</option>
                                <option value="Q4">Q4 (Oct-Dec)</option>
                            </select>
                            
                            <select id="filterYear" onchange="updateUI()" style="flex: 1; min-width: 80px; display: none; padding: 0.5rem;">
                                <!-- Populated dynamically -->
                            </select>

                            <button onclick="exportToCSV()" class="btn-secondary" title="Export CSV"><i class='bx bx-table'></i></button>
                            <button onclick="exportToPDF()" class="btn-secondary" title="Export PDF Report" style="background: var(--danger);"><i class='bx bxs-file-pdf'></i></button>
                        </div>
                    </div>

                    <ul id="expenseList" class="expense-list">
                        <!-- Expenses injected here -->
                    </ul>
                </div>
                
                <div class="card analytics-card" id="analyticsCard">
                    <h2><i class='bx bx-line-chart'></i> Analytics Dashboard</h2>
                    <div id="insights" class="insights-box"></div>
                    
                    <div class="charts-grid">
                        <div class="chart-container">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Category Modal -->
    <div id="categoryModal" class="modal-overlay hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 1000; display:flex; justify-content:center; align-items:center;">
        <div class="card" style="width: 400px; max-width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin:0; border:none; padding:0;">Manage Categories</h2>
                <button onclick="closeCategoryModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom: 1rem;">
                <input type="text" id="newCategoryName" placeholder="New Category Name" style="flex:1;">
                <input type="color" id="newCategoryColor" value="#3b82f6" style="width: 40px; height: 40px; padding: 0; border-radius: 8px;">
                <button onclick="addCategory()" class="btn-primary" style="padding: 0.5rem 1rem;"><i class='bx bx-plus'></i></button>
            </div>

            <ul id="categoryList" style="list-style:none; padding:0; margin:0;">
                <!-- Categories loaded here -->
            </ul>
        </div>
    </div>

    <!-- Receipt Image Modal -->
    <div id="receiptModal" class="modal-overlay hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; display:flex; justify-content:center; align-items:center;">
        <div style="position: relative; max-width: 90%; max-height: 90%;">
            <button onclick="closeReceiptModal()" style="position: absolute; top: -40px; right: 0; background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
            <img id="receiptImage" src="" style="max-width: 100%; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
